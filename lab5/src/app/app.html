<div class="app-container">
  <header class="header">
    <div class="container header-inner">
      <img src="/qaspi_logo.svg" alt="Qaspi Logo" class="logo" />
      <span class="header-category">Qaspi.gz</span>
    </div>
  </header>

  <main class="container">
    <div class="filters-row">
      <div class="search-container">
        <label for="search">Search products</label>
        <input id="search" type="text" [(ngModel)]="searchQuery" placeholder="Find what you need..." />
      </div>

      <div class="filter-container">
        <label for="category">Category</label>
        <select id="category" [(ngModel)]="selectedCategory">
          @for (category of categories; track category.id) {
          <option [value]="category.id">{{ category.name }}</option>
          }
        </select>
      </div>
    </div>

    <app-product-list [products]="filteredProducts" (remove)="onProductRemove($event)" />
  </main>

  @if (deletedProduct) {
  <div class="undo-toast">
    <div class="undo-toast-content">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="3 6 5 6 21 6"></polyline>
        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
      </svg>
      <span>Card removed</span>
    </div>
    <button class="undo-btn" (click)="undoRemove()">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="1 4 1 10 7 10"></polyline>
        <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path>
      </svg>
      Undo
    </button>
  </div>
  }
</div>
